site_name: nanom
site_description: >-
  A header-only C++23/26 parser-combinator library for binary formats, modeled on Rust's nom —
  with struct reflection (macro-free under C++26 P2996), Arrow/Avro/JSON/CSV schemas, and columnar
  storage. Zero-copy; at parity with stable Rust nom on streaming pcapng.
site_url: https://yoavbendor.github.io/nanom/
repo_url: https://github.com/yoavbendor/nanom
repo_name: yoavbendor/nanom
edit_uri: edit/main/docs/
copyright: Apache-2.0

docs_dir: docs
site_dir: site

theme:
  name: material
  custom_dir: overrides
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.footer
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - toc.follow

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Cheat sheet (nom → nanom): CHEATSHEET.md
  - nom parity audit: NOM_PARITY_AUDIT.md
  - Design: design.md
  - C++26 reflection: P2996_COMPAT.md
  - Benchmarks:
      - vs Rust nom (streaming pcapng): BENCH_RUST_NOM.md
      - vs nanotins (overlay decode): NANOTINS_COMPARISON.md
      - GPU / bulk: GPU.md
  - API reference: https://yoavbendor.github.io/nanom/api/
  - Live benchmark chart: https://yoavbendor.github.io/nanom/dev/bench/

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/yoavbendor/nanom
