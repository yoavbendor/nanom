name: ci

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---- matrix build + full ctest, warnings-as-errors --------------------
  build-test:
    name: ${{ matrix.cxx }} / ${{ matrix.build }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        # clang-17's C++23 front-end can't compile bulk.hpp (std::apply fold);
        # clang-18 is nanom's real floor. gcc-13 is the gcc floor.
        cxx: [g++-13, g++-14, clang++-18]
        build: [Debug, Release]
    steps:
      - uses: actions/checkout@v4
      - name: install compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ startsWith(matrix.cxx, 'clang') && 'clang-18' || 'g++-13 g++-14' }}
      - name: configure
        run: cmake -B build -DCMAKE_CXX_COMPILER=${{ matrix.cxx }}
             -DCMAKE_BUILD_TYPE=${{ matrix.build }} -DNANOM_WERROR=ON
      - name: build
        run: cmake --build build -j
      - name: test
        run: ctest --test-dir build --output-on-failure -j

  # ---- sanitizers (gcc runtimes are always present on the runner) -------
  sanitizers:
    name: sanitize (${{ matrix.san }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        san: ["address,undefined", "thread"]
    steps:
      - uses: actions/checkout@v4
      - name: configure
        run: cmake -B build -DCMAKE_CXX_COMPILER=g++-13
             -DCMAKE_BUILD_TYPE=RelWithDebInfo -DNANOM_SANITIZER=${{ matrix.san }}
      - run: cmake --build build -j
      - name: test
        run: ctest --test-dir build --output-on-failure -j
        env:
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
          ASAN_OPTIONS: detect_leaks=1

  # ---- installed-package smoke: find_package(nanom) from a downstream ---
  install-consumer:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: install nanom
        run: |
          cmake -B build -DCMAKE_INSTALL_PREFIX=$PWD/_prefix
          cmake --install build
      - name: build downstream consumer
        run: |
          cmake -S test/consumer -B _cons -DCMAKE_PREFIX_PATH=$PWD/_prefix
          cmake --build _cons
          ./_cons/consumer

  # ---- every header compiles standalone (no missing includes) -----------
  header-selfcontained:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: compile each header alone
        run: |
          set -e
          for h in include/nanom/*.hpp; do
            echo "== $h =="
            echo "#include \"$h\"
            int main(){}" | g++-13 -std=c++23 -Wall -Wextra -Wpedantic -Werror \
              -I include -x c++ - -o /dev/null
          done

  # ---- amalgamation: the generated single-file header must always compile ----
  #      tools/amalgamate.py expands the layered include/nanom/*.hpp into one
  #      nanom-single.hpp (the Godbolt "try it" / llms-full.txt payload). It is
  #      gitignored and regenerated here so it can never silently rot: generate,
  #      then compile + run a tiny strct<>/soa<> smoke under -Werror.
  amalgamation:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: generate nanom-single.hpp
        run: python3 tools/amalgamate.py --out nanom-single.hpp
      - name: compile + run single-header smoke
        run: |
          cat > /tmp/amalg_smoke.cpp <<'EOF'
          #include "nanom-single.hpp"
          #include <array>
          #include <cstdint>
          #include <cstdio>
          namespace nm = nanom;
          struct eth_hdr {
            std::array<std::uint8_t, 6> dst, src;
            nm::be<std::uint16_t>       eth_type;
          };
          NANOM_DESCRIBE(eth_hdr, dst, src, eth_type);
          int main() {
            const std::array<std::uint8_t, 14> bytes = {
              0x01,0x02,0x03,0x04,0x05,0x06, 0x0a,0x0b,0x0c,0x0d,0x0e,0x0f, 0x08,0x00};
            auto r = nm::strct<eth_hdr>()(nm::from(bytes));
            if (!r) { std::puts("parse failed"); return 1; }
            nm::soa<eth_hdr> col; col.push(r->value);
            return (r->value.eth_type == 0x0800 && col.rows() == 1) ? 0 : 2;
          }
          EOF
          g++-13 -std=c++23 -Wall -Wextra -Werror -I . /tmp/amalg_smoke.cpp -o /tmp/amalg_smoke
          /tmp/amalg_smoke
      - name: generate llms-full.txt (fetch-once LLM context)
        run: python3 tools/gen_llms.py --out llms-full.txt --single nanom-single.hpp

  # ---- portability check on macOS via Homebrew LLVM (AppleClang's C++23 is
  #      too old for nanom; advisory so it can never block main) -------------
  macos:
    runs-on: macos-14
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: install LLVM
        run: brew install llvm@18
      - name: build + test with brew clang
        run: |
          CXX="$(brew --prefix llvm@18)/bin/clang++"
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER="$CXX"
          cmake --build build -j
          ctest --test-dir build --output-on-failure -j

  # ---- C++26 P2996 reflection: the macro-free nanom (nanom26.hpp) ----------
  # Runs the FULL suite (incl. the golden-diff parity tests) twice: pure-reflection mode (every
  # NANOM_DESCRIBE degrades to a coverage static_assert) and macro-parity mode (FORCE_MACRO's
  # explicit specializations win) — the outputs must be identical either way. The only P2996
  # compiler today is the experimental Bloomberg clang-p2996 fork, consumed as a community docker
  # image pinned by immutable digest (vsavkov/clang-p2996:amd64, pulled 2026-07-03); advisory
  # (continue-on-error) until a released compiler exists. <meta> lives in the fork's libc++,
  # hence the -stdlib flag; NANOM_REFLECTION_FLAGS is the one knob to swap toolchains later.
  reflection-cxx26:
    runs-on: ubuntu-24.04
    continue-on-error: true
    container:
      image: vsavkov/clang-p2996@sha256:6672c4227b09efc7318695c17e8a8f696e193f451b52d885d220f593593dc1c8
    strategy:
      fail-fast: false
      matrix:
        mode: [reflection, macro-parity]
    steps:
      - uses: actions/checkout@v4
      - name: install build tools (image ships only the toolchain)
        run: |
          command -v cmake >/dev/null && command -v make >/dev/null || {
            apt-get update && apt-get install -y --no-install-recommends cmake make git ca-certificates
          }
      - name: locate fork clang
        run: |
          CXX=$(command -v clang++ || ls /usr/local/bin/clang++ /opt/*/bin/clang++ 2>/dev/null | head -1)
          echo "CXX=$CXX" >> "$GITHUB_ENV"
          "$CXX" --version
      - name: configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER="$CXX"
             -DNANOM_CXX26_REFLECTION=ON -DNANOM_WERROR=ON
             -DCMAKE_CXX_FLAGS=${{ matrix.mode == 'macro-parity' && '-DNANOM_DESCRIBE_FORCE_MACRO' || '""' }}
      - name: build
        run: cmake --build build -j
      - name: test
        run: ctest --test-dir build --output-on-failure -j
      - name: upload test log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: reflection-cxx26-${{ matrix.mode }}-log
          path: build/Testing/Temporary/LastTest.log

  # ---- extra warnings, non-blocking (surfaces shadow/conversion info) ---
  warnings-extra:
    runs-on: ubuntu-24.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - run: cmake -B build -DCMAKE_CXX_COMPILER=g++-13
             -DCMAKE_CXX_FLAGS="-Wshadow -Wconversion -Wsign-conversion"
      - run: cmake --build build -j 2>&1 | tee build.log
      - run: 'echo "extra warnings: $(grep -c "warning:" build.log)"'

  # ---- clang-tidy static analysis (advisory) ----------------------------
  clang-tidy:
    runs-on: ubuntu-24.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y clang-tidy-18
      - name: configure (export compile_commands.json)
        run: cmake -B build -DCMAKE_CXX_COMPILER=clang++-18 -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
      - name: tidy the sources
        # reflect26/test_reflect26 are C++26-reflection-only TUs (#error without a P2996
        # compiler), so a stock clang-tidy cannot analyze them — skip them here.
        run: |
          clang-tidy-18 -p build \
            tests/test_nanom.cpp $(ls examples/*.cpp | grep -v reflect26) examples/nanotins_parity/*.cpp

  # ---- line coverage of the test suite, uploaded as an artifact ---------
  coverage:
    runs-on: ubuntu-24.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y lcov
      - name: build with coverage
        run: |
          cmake -B build -DCMAKE_CXX_COMPILER=g++-13 -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="--coverage -O0"
          cmake --build build -j
      - run: ctest --test-dir build -j
      - name: collect coverage
        run: |
          lcov --capture --directory build --output-file coverage.info \
               --ignore-errors mismatch,negative 2>/dev/null || \
          lcov --capture --directory build --output-file coverage.info
          lcov --extract coverage.info "*/include/nanom/*" --output-file nanom.info
          lcov --list nanom.info
          genhtml nanom.info --output-directory coverage-html 2>/dev/null || true
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: coverage-html
