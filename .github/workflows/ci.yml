name: ci
on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        cxx: [g++-13, clang++-18]
    steps:
      - uses: actions/checkout@v4
      - name: configure
        run: cmake -B build -DCMAKE_CXX_COMPILER=${{ matrix.cxx }} -DCMAKE_BUILD_TYPE=Release
      - name: build
        run: cmake --build build -j
      - name: test
        run: ctest --test-dir build --output-on-failure
